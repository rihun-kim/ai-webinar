    <link

      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #06070f;
        min-height: 100vh;
        padding: 40px 16px 100px;
        color: #fff;
        word-break: keep-all;
        line-height: 1.5;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .hub {
        width: 100%;
        max-width: 560px;
        background: #0a0b1e;
        border-radius: 28px;
        overflow: hidden;
        box-shadow:
          0 60px 120px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.06);
        position: relative;
      }

      .hub__hero {
        position: relative;
        padding: 56px 40px 40px;
        background: linear-gradient(
          135deg,
          #0f0c29 0%,
          #302b63 50%,
          #24243e 100%
        );
        overflow: hidden;
      }
      .hub__hero::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.4),
          transparent 60%
        );
        top: -250px;
        right: -180px;
        filter: blur(40px);
        pointer-events: none;
      }
      .hub__hero::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(245, 158, 11, 0.28),
          transparent 60%
        );
        bottom: -180px;
        left: -120px;
        filter: blur(40px);
        pointer-events: none;
      }
      .hub__hero-inner {
        position: relative;
        z-index: 2;
      }

      .hub__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 22px;
      }
      .hub__brand-dot {
        width: 10px;
        height: 10px;
        background: #fbbf24;
        border-radius: 50%;
        box-shadow: 0 0 14px #fbbf24;
      }

      .hub__title {
        font-size: clamp(28px, 5vw, 36px);
        font-weight: 900;
        line-height: 1.2;
        letter-spacing: -0.04em;
        margin-bottom: 12px;
      }
      .hub__title-accent {
        display: block;
        background: linear-gradient(
          135deg,
          #fbbf24 0%,
          #f97316 50%,
          #ec4899 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hub__lead {
        font-size: 14px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.78);
      }
      .hub__lead strong {
        color: #fff;
        font-weight: 700;
      }

      .hub__list-section {
        padding: 32px 40px 40px;
      }
      .hub__list-label {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        color: #fbbf24;
        margin-bottom: 14px;
      }

      .hub__list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .hub__card {
        display: grid;
        grid-template-columns: 76px 1fr 28px;
        gap: 18px;
        align-items: center;
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        transition: all 0.2s;
      }
      .hub__card:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(251, 191, 36, 0.4);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }

      .hub__card-date {
        text-align: center;
        padding: 12px 0;
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.25);
        border-radius: 12px;
      }
      .hub__card-month {
        font-size: 11px;
        font-weight: 800;
        color: #fbbf24;
        letter-spacing: 0.06em;
      }
      .hub__card-day {
        font-size: 28px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.04em;
        margin: 4px 0 2px;
        color: #fff;
      }
      .hub__card-weekday {
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.7);
      }

      .hub__card-body h3 {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 4px;
        line-height: 1.3;
      }
      .hub__card-body p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.5;
      }

      .hub__card-arrow {
        font-size: 20px;
        font-weight: 700;
        color: #fbbf24;
        transition: transform 0.2s;
      }
      .hub__card:hover .hub__card-arrow {
        transform: translateX(4px);
      }

      .hub__footer {
        margin-top: 22px;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.6;
        text-align: center;
      }
      .hub__footer strong {
        color: rgba(255, 255, 255, 0.85);
      }

      @media (max-width: 600px) {
        body {
          padding: 16px 8px 80px;
        }
        .hub__hero {
          padding: 44px 24px 32px;
        }
        .hub__list-section {
          padding: 24px 24px 32px;
        }
        .hub__card {
          grid-template-columns: 68px 1fr 24px;
          gap: 14px;
          padding: 16px 18px;
        }
        .hub__card-day {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="hub">
      <section class="hub__hero">

            <div class="hub__card-body">

              <p>온라인 웨비나 · 45분</p>
            </div>
            <div class="hub__card-arrow">→</div>
          </a>

          <a class="hub__card" href="/webinar/1/20260514">
            <div class="hub__card-date">
              <div class="hub__card-month">5월</div>
              <div class="hub__card-day">14</div>
              <div class="hub__card-weekday">목요일</div>
            </div>
            <div class="hub__card-body">
              <h3>5월 14일 (목) 저녁 9시</h3>
              <p>온라인 웨비나 · 45분</p>
            </div>
            <div class="hub__card-arrow">→</div>
          </a>
        </div>

        <div class="hub__footer">
          <strong>HOST</strong> · IT 대기업 현직 개발자(아빠)
        </div>
      </section>
    </main>
  </body>
</html>
