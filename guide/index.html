<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웨일온 입장 안내 | AI 웨비나</title>
    <meta
      name="description"
      content="웨비나를 듣기 위해선 웨일 브라우저 설치가 필요합니다. 5분이면 됩니다."
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI 시대, 우리 아이 교육" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="웨일온 입장 안내 | AI 웨비나" />
    <meta
      property="og:description"
      content="웨일 브라우저 설치 → 회의 입장. 5분이면 됩니다."
    />
    <meta property="og:url" content="https://ai-webinar.pages.dev/guide/" />
    <meta
      property="og:image"
      content="https://ai-webinar.pages.dev/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #06070f;
        min-height: 100vh;
        padding: 40px 16px 100px;
        color: #fff;
        word-break: keep-all;
        line-height: 1.5;
        display: flex;
        justify-content: center;
      }

      .poster {
        width: 100%;
        max-width: 760px;
        background: #0a0b1e;
        border-radius: 28px;
        overflow: hidden;
        box-shadow:
          0 60px 120px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .section {
        position: relative;
        padding: 56px 48px;
        overflow: hidden;
      }
      .section + .section {
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* HERO */
      .hero {
        background: linear-gradient(
          135deg,
          #0f0c29 0%,
          #302b63 50%,
          #24243e 100%
        );
        padding: 64px 48px 56px;
      }
      .hero::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(34, 197, 94, 0.3),
          transparent 60%
        );
        top: -300px;
        right: -200px;
        filter: blur(40px);
        pointer-events: none;
      }
      .hero__inner {
        position: relative;
        z-index: 2;
      }
      .hero__eyebrow {
        display: inline-block;
        padding: 6px 14px;
        background: rgba(34, 197, 94, 0.14);
        border: 1px solid rgba(34, 197, 94, 0.35);
        color: #4ade80;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border-radius: 999px;
        margin-bottom: 20px;
      }
      .hero__title {
        font-size: clamp(30px, 5vw, 44px);
        font-weight: 900;
        line-height: 1.2;
        letter-spacing: -0.04em;
        margin-bottom: 18px;
      }
      .hero__title-accent {
        background: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero__lead {
        font-size: 15px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.85);
      }
      .hero__lead strong {
        color: #fff;
        font-weight: 700;
      }

      /* STEP */
      .step {
        background: linear-gradient(180deg, #0a0b1e 0%, #11142b 100%);
      }
      .step__head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
      }
      .step__num {
        flex-shrink: 0;
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 900;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
      }
      .step:nth-child(3) .step__num {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }
      .step:nth-child(4) .step__num {
        background: linear-gradient(135deg, #fbbf24, #f97316);
        color: #1a1d29;
      }
      .step__title {
        font-size: clamp(22px, 3.4vw, 28px);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1.25;
      }

      .step__screenshot {
        margin-top: 6px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
      }
      .step__screenshot img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 10px;
        background: #fff;
      }
      .step__caption {
        margin-top: 16px;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
        color: #fbbf24;
        letter-spacing: -0.01em;
      }

      .step__cta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 22px 28px;
        border-radius: 18px;
        text-decoration: none;
        transition: all 0.25s;
      }
      .step__cta--whale {
        background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        box-shadow: 0 16px 40px rgba(34, 197, 94, 0.4);
      }
      .step__cta--meet {
        background: linear-gradient(135deg, #22d3ee 0%, #0ea5e9 100%);
        box-shadow: 0 16px 40px rgba(14, 165, 233, 0.4);
      }
      .step__cta:hover {
        transform: translateY(-2px);
      }
      .step__cta--whale:hover {
        box-shadow: 0 24px 48px rgba(34, 197, 94, 0.5);
      }
      .step__cta--meet:hover {
        box-shadow: 0 24px 48px rgba(14, 165, 233, 0.5);
      }
      .step__cta-text {
        color: #062512;
        font-size: 17px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }
      .step__cta--meet .step__cta-text {
        color: #052438;
      }
      .step__cta-text small {
        display: block;
        font-size: 12px;
        font-weight: 600;
        opacity: 0.75;
        margin-top: 2px;
      }
      .step__cta-arrow {
        width: 44px;
        height: 44px;
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
        flex-shrink: 0;
      }

      /* OUTRO */
      .outro {
        background: linear-gradient(180deg, #11142b 0%, #0a0b1e 100%);
        text-align: center;
        padding: 48px 48px 56px;
      }
      .outro__msg {
        font-size: 15px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.78);
      }
      .outro__msg strong {
        color: #fbbf24;
        font-weight: 800;
      }
      .outro__divider {
        width: 32px;
        height: 2px;
        background: rgba(255, 255, 255, 0.15);
        margin: 22px auto;
        border-radius: 999px;
      }
      .outro__contact {
        font-size: 13.5px;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.65;
      }

      @media (max-width: 600px) {
        body {
          padding: 16px 8px 80px;
        }
        .section {
          padding: 40px 24px;
        }
        .hero {
          padding: 48px 24px 44px;
        }
        .outro {
          padding: 40px 24px 44px;
        }
        .step__num {
          width: 44px;
          height: 44px;
          font-size: 17px;
          border-radius: 12px;
        }
        .step__cta {
          padding: 18px 22px;
        }
      }
    </style>
  </head>
  <body>
    <article class="poster">
      <section class="section hero">
        <div class="hero__inner">
          <span class="hero__eyebrow">웨비나 입장 안내</span>
          <h1 class="hero__title">
            유익한 AI 교육 강의<br />
            <span class="hero__title-accent">이곳에서 계속됩니다</span>
          </h1>
          <p class="hero__lead">
            웨비나를 들으시려면 <strong>설치가 필수</strong>입니다.<br />
            <strong>5분이면 됩니다.</strong><br />
            자료를 함께 보기 위해 <strong>노트북 참여를 권장</strong>드립니다.
          </p>
        </div>
      </section>

      <section class="section step">
        <div class="step__head">
          <div class="step__num">1</div>
          <h2 class="step__title">웨일 브라우저 설치</h2>
        </div>
        <a
          class="step__cta step__cta--whale"
          href="https://whale.naver.com/ko/"
          target="_blank"
          rel="noopener"
        >
          <div class="step__cta-text">
            웨일 브라우저 다운로드
            <small>whale.naver.com</small>
          </div>
          <div class="step__cta-arrow">→</div>
        </a>
      </section>

      <section class="section step">
        <div class="step__head">
          <div class="step__num">2</div>
          <h2 class="step__title">테스트 입장해보기</h2>
        </div>
        <a
          class="step__cta step__cta--meet"
          href="https://whaleon.us/o/CSwVqc/b6859d7c6afe4357a52a4562521fb6f6"
          target="_blank"
          rel="noopener"
        >
          <div class="step__cta-text">
            테스트 입장해보기
            <small>설치 완료 후 클릭</small>
          </div>
          <div class="step__cta-arrow">→</div>
        </a>
      </section>

      <section class="section step">
        <div class="step__head">
          <div class="step__num">3</div>
          <h2 class="step__title">이렇게 나오면 완성!</h2>
        </div>
        <div class="step__screenshot">
          <img
            src="./step3-success.png"
            alt="웨일온 회의 대기 화면 — 호스트가 회의를 시작하지 않았습니다"
          />
        </div>
        <p class="step__caption">이 화면이 보이면 사전 준비 완료입니다.</p>
      </section>

      <section class="section outro">
        <p class="outro__contact">
          문제가 있으시면 회신받으신 번호로 문의주세요.
        </p>
      </section>
    </article>
  </body>
</html>
